name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/workflows/ci.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    environment:
      name: production
      url: https://lemon-sky-092c0940f.4.azurestaticapps.net
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_SKY_092C0940F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: ""
      - name: Post-Deploy Health Check
        if: github.event_name == 'push'
        run: |
          echo "Waiting 15 seconds for deployment to propagate..."
          sleep 15
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://lemon-sky-092c0940f.4.azurestaticapps.net)
          echo "Health check response: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "::warning::Health check returned $RESPONSE"
          else
            echo "✅ Site is live and healthy!"
          fi

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_SKY_092C0940F }}
          action: "close"
